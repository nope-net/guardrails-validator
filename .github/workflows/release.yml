name: release

# Publishes to PyPI when a version tag (v*) is pushed. Inert until both:
#   1. a tag like `v0.2.0` is pushed, AND
#   2. PyPI "trusted publishing" is configured for this repo (see RELEASE.md).
# No API tokens are stored in the repo — publishing uses OIDC trusted publishing.

on:
  push:
    tags: ["v*"]

jobs:
  # Gate the release on a REAL call to the production API. This is the check the
  # previous version lacked: mocked unit tests passed against a dead endpoint.
  # Skips automatically if the NOPE_API_KEY secret is not configured.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Live smoke test against api.nope.net
        env:
          NOPE_API_KEY: ${{ secrets.NOPE_API_KEY }}
        run: pytest tests/test_live_smoke.py -v

  pypi-publish:
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nope-crisis-screen/
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(python -c 'import nope_crisis_screen; print(nope_crisis_screen.__version__)')"
          GIT_TAG="${GITHUB_REF_NAME}"
          echo "package=$PKG_VERSION tag=$GIT_TAG"
          test "$PKG_VERSION" = "$GIT_TAG" || { echo "::error::tag $GIT_TAG != package $PKG_VERSION"; exit 1; }
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
